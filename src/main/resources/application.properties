spring.application.name=restaurant-digital-app

# Configuration MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/bdmenu?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

server.compression.enabled=false

# Désactiver le chunked encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Configuration Spring

spring.jackson.serialization.write_dates_as_timestamps=false


# Configuration pour servir les fichiers statiques (images)
spring.web.resources.static-locations=classpath:/static/,file:./uploads/


# Désactiver les logs dans la réponse
server.servlet.encoding.force-response=true
spring.jackson.serialization.fail-on-empty-beans=false

# Désactiver les logs de debug
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# ✅ NOUVEAU (correct pour Hibernate 7+)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server configuration
server.port=8080
server.servlet.context-path=/api/v1
server.error.include-message=always
server.error.include-binding-errors=always

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.restaurant.digital=DEBUG

# Jackson Configuration
spring.jackson.serialization.indent_output=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Europe/Paris

# Multipart Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB